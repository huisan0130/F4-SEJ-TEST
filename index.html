<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F4 SEJ 实力测试 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'f4-sej-test-pro';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.appId = appId;
        window.addDoc = addDoc;
        window.collection = collection;
        window.serverTimestamp = serverTimestamp;

        const token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        if (token) {
            signInWithCustomToken(auth, token).catch(() => signInAnonymously(auth));
        } else {
            signInAnonymously(auth);
        }
    </script>
    <style>
        :root {
            --brand-orange: #FF8C00;
            --brand-yellow: #FFD700;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000;
            background-image: radial-gradient(circle at 2px 2px, #222 1px, transparent 0);
            background-size: 32px 32px;
            color: #fff;
            overflow-x: hidden;
        }
        .cute-font { font-family: 'ZCOOL KuaiLe', cursive; }
        .orange-glow { box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); }
        .gradient-btn { background: linear-gradient(45deg, #FF8C00, #FFA500); }
        .card { border-radius: 40px; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px); }
        
        /* 动画效果 */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .float-item { animation: float 4s ease-in-out infinite; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .hidden { display: none; }

        /* 输入框美化 */
        .cute-input {
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .cute-input:focus {
            border-color: var(--brand-orange);
            transform: scale(1.02);
            outline: none;
        }
        .option-btn {
            background: #222;
            border: 2px solid #333;
            border-radius: 20px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .option-btn:hover {
            background: var(--brand-orange);
            color: #000;
            transform: translateY(-5px) scale(1.03);
            border-color: #fff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 封面页 -->
    <div id="start-page" class="max-w-md w-full text-center relative">
        <!-- 装饰性小元素 -->
        <div class="absolute -top-10 -left-5 text-4xl float-item">🔥</div>
        <div class="absolute top-20 -right-8 text-4xl float-item" style="animation-delay: 1s">💡</div>
        <div class="absolute -bottom-10 right-10 text-4xl float-item" style="animation-delay: 2s">📚</div>

        <div class="card p-10 border-4 border-orange-500/50 orange-glow">
            <div class="mb-6 relative inline-block">
                <!-- 可爱插图 -->
                <div class="w-32 h-32 bg-yellow-400 rounded-full mx-auto flex items-center justify-center border-4 border-white shadow-lg overflow-hidden">
                    <svg viewBox="0 0 100 100" class="w-24 h-24">
                        <circle cx="50" cy="45" r="30" fill="#FF8C00" />
                        <rect x="35" y="30" width="30" height="20" rx="5" fill="#333" /> <!-- 眼镜框 -->
                        <circle cx="42" cy="40" r="3" fill="#fff" /> <!-- 眼睛 -->
                        <circle cx="58" cy="40" r="3" fill="#fff" />
                        <path d="M40 60 Q50 70 60 60" stroke="#fff" stroke-width="3" fill="none" /> <!-- 笑脸 -->
                    </svg>
                </div>
                <div class="absolute -bottom-2 -right-2 bg-pink-500 text-white text-xs font-bold px-3 py-1 rounded-full rotate-12">A+ Battle!</div>
            </div>

            <h1 class="text-4xl font-black mb-2 cute-font tracking-wide">
                <span class="text-orange-500">F4 SEJ</span> 实力测试
            </h1>
            <p class="text-gray-400 text-sm mb-8 font-medium">⚡ 5分钟测出你对Form 4 SEJ的了解度</p>

            <div class="mb-8 text-left">
                <label class="block text-xs font-bold text-orange-400 mb-2 ml-4 uppercase tracking-widest">Type your name / 你的名字</label>
                <input type="text" id="user-name" placeholder="输入超强大名..." class="cute-input w-full py-4 px-6 text-lg text-white">
            </div>

            <button onclick="startQuiz()" class="gradient-btn w-full py-5 rounded-full font-black text-xl text-black shadow-xl hover:scale-105 active:scale-95 transition-all pulse">
                GO! 开始挑战 ➔
            </button>
        </div>
    </div>

    <!-- 答题页 -->
    <div id="quiz-page" class="max-w-md w-full hidden">
        <div class="card p-8 border-4 border-orange-500/30">
            <div class="flex justify-between items-center mb-6">
                <div id="progress-text" class="text-xs font-bold text-orange-500 uppercase">Question 1/13</div>
                <div class="w-32 h-2 bg-gray-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-orange-500" style="width: 0%"></div>
                </div>
            </div>

            <h2 id="question-text" class="text-xl font-bold mb-8 leading-tight">载入中...</h2>
            
            <div id="options-container" class="space-y-4">
                <!-- 选项动态生成 -->
            </div>
        </div>
    </div>

    <!-- 结果页 -->
    <div id="result-page" class="max-w-md w-full hidden">
        <div class="card p-8 border-4 border-yellow-500 orange-glow text-center">
            <div class="mb-2 text-4xl">🎉</div>
            <h2 class="text-orange-500 font-black text-2xl mb-4 cute-font italic uppercase">恭喜完成测试!</h2>
            
            <div class="relative w-40 h-40 mx-auto mb-6">
                <svg class="w-full h-full" viewBox="0 0 36 36">
                    <path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#222" stroke-width="3" />
                    <path id="score-circle-path" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#FF8C00" stroke-width="3" stroke-dasharray="0, 100" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="final-score" class="text-5xl font-black">0</span>
                    <span class="text-[10px] text-gray-500 font-bold">SCORE</span>
                </div>
            </div>
            
            <h3 id="result-title" class="text-2xl font-black mb-4">诊断结果</h3>
            <div id="result-desc" class="text-sm text-gray-300 mb-8 bg-black/40 p-5 rounded-3xl text-left border border-white/5 leading-relaxed">
                <!-- 动态诊断内容 -->
            </div>

            <!-- A战役课程特点 (根据 Screenshot 2026-05-13 160244.jpg) -->
            <div class="mb-8 text-left space-y-3">
                <div class="bg-yellow-400/10 p-4 rounded-3xl border-2 border-yellow-400/20">
                    <h4 class="text-yellow-400 font-black text-sm mb-3 cute-font">🌟 为何一定要参加《A战役》？</h4>
                    <ul class="text-[11px] space-y-2 text-gray-200 font-medium">
                        <li class="flex items-center">✨ <span class="ml-2"><b>10堂课学完 10个 Bab</b>，不拖泥带水</span></li>
                        <li class="flex items-center">✨ <span class="ml-2"><b>只教今年考试会出的重点 Topic</b></span></li>
                        <li class="flex items-center">✨ <span class="ml-2"><b>一站式全包</b>：Struktur, Esei, KBAT</span></li>
                        <li class="flex items-center">✨ <span class="ml-2"><b>10年经验</b>：年年都有 A+ 学生，今年是你！</span></li>
                        <li class="flex items-center">✨ <span class="ml-2"><b>拒绝迷茫</b>：让老师帮你从头复习</span></li>
                    </ul>
                </div>
            </div>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSf_6PYNMiS70t-dD2buPptvZgOIg43ovKcpl0VfGn_J_OvM6Q/viewform" target="_blank" class="gradient-btn block w-full py-5 rounded-full font-black text-xl text-black shadow-lg hover:scale-105 transition-all">
                立刻报名《A战役》 🚀
            </a>
            <p class="mt-4 text-[10px] text-gray-500">不要让 SEJ 拖慢你拿全 A 的脚步！</p>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "1. F4 BAB 1: 在 Hukum Kanun Melaka 中，针对“Membunuh orang lain tanpa pengetahuan raja”的惩罚体现了：",
                options: [
                    { t: "Daulat dan kedaulatan Raja diiktiraf", s: 10 },
                    { t: "Rakyat mempunyai hak membalas dendam", s: 0 },
                    { t: "Sultan tidak berkuasa dalam undang-undang", s: 0 }
                ]
            },
            {
                q: "2. F4 BAB 2: 哪一项是导致 Nasionalisme di Filipina 从“改革要求”转变为“武装革命”的关键转折点？",
                options: [
                    { t: "Kegagalan Gerakan Propaganda dan penahanan Jose Rizal", s: 10 },
                    { t: "Pengaruh Revolusi Keagamaan di Barat", s: 0 },
                    { t: "Sokongan Amerika Syarikat terhadap Katipunan", s: 0 }
                ]
            },
            {
                q: "3. F4 BAB 3: 为什么 Liga Bangsa (League of Nations) 无法阻止 Perang Dunia Kedua 的爆发？",
                options: [
                    { t: "Gagal menangani krisis pencerobohan Jerman dan Itali", s: 10 },
                    { t: "Kekurangan dana daripada negara-negara Asia", s: 0 },
                    { t: "Terlalu memberi tumpuan kepada Revolusi Rusia", s: 0 }
                ]
            },
            {
                q: "4. F4 BAB 3: Pendudukan Jepun 期间推行的“Lingkungan Kesemakmuran Asia Timur Raya”口号，其实际目的是：",
                options: [
                    { t: "Eksploitasi ekonomi demi kepentingan ketenteraan Jepun", s: 10 },
                    { t: "Memberi kemerdekaan penuh kepada Tanah Melayu", s: 0 },
                    { t: "Menghapuskan sistem beraja di Asia Tenggara", s: 0 }
                ]
            },
            {
                q: "5. F4 BAB 4: 马来社会坚决反对 Malayan Union 的最核心原因是：",
                options: [
                    { t: "Kedaulatan Raja-raja Melayu dan hak istimewa terancam", s: 10 },
                    { t: "British ingin membawa masuk lebih ramai buruh asing", s: 0 },
                    { t: "Sultan-sultan tidak diberikan gaji oleh British", s: 0 }
                ]
            },
            {
                q: "6. F4 BAB 5: 与 Malayan Union 相比，PTM 1948 的哪项特征成功维护了马来主权？",
                options: [
                    { t: "Syarat kewarganegaraan diperketatkan (bukan Jus Soli)", s: 10 },
                    { t: "Gabenor British mempunyai kuasa mutlak", s: 0 },
                    { t: "Singapura digabungkan ke dalam Tanah Melayu", s: 0 }
                ]
            },
            {
                q: "7. F4 BAB 6: Templer 将军推行的 Perang Saraf 战略，旨在通过什么方式来达成抗共目标？",
                options: [
                    { t: "Memenangi hati rakyat untuk menyokong kerajaan", s: 10 },
                    { t: "Menggunakan bom kimia di dalam hutan", s: 0 },
                    { t: "Memperkenalkan Rancangan Briggs secara kekerasan", s: 0 }
                ]
            },
            {
                q: "8. F4 BAB 7: 1951年设立的 Sistem Ahli 对我国独立过程最重要的贡献是：",
                options: [
                    { t: "Melatih penduduk tempatan dalam pentadbiran kerajaan", s: 10 },
                    { t: "Menentukan tarikh kemerdekaan negara", s: 0 },
                    { t: "Menggantikan jawatan Sultan dalam negeri", s: 0 }
                ]
            },
            {
                q: "9. F4 BAB 8: 1955年 Pilihan Raya Umum 中，Parti Perikatan 的胜利象征着：",
                options: [
                    { t: "Permulaan kerjasama antara kaum menuju kemerdekaan", s: 10 },
                    { t: "Penghapusan pengaruh British secara total", s: 0 },
                    { t: "Penerimaan ideologi komunis dalam parlimen", s: 0 }
                ]
            },
            {
                q: "10. F4 BAB 9/10: Suruhanjaya Reid 在起草宪法草案时，必须确保平衡哪两个关键要素？",
                options: [
                    { t: "Hak istimewa orang Melayu & kepentingan kaum lain", s: 10 },
                    { t: "Kuasa British & Kuasa Parti Komunis Malaya", s: 0 },
                    { t: "Sistem Republik & Sistem Beraja Berperlembagaan", s: 0 }
                ]
            },
            {
                q: "11. 哎哟，每次自己复习的时候，我都会陷入“不知道要复习什么”的黑洞…… 😵‍💫",
                options: [
                    { t: "A. 同意 (救命啊！)", s: 0, reason: "needs_study_buddy" },
                    { t: "B. 不同意 (我超稳的)", s: 0 }
                ]
            },
            {
                q: "12. 每次考试我都能提前复习，从来不后悔没早点开始！😏",
                options: [
                    { t: "A. 同意 (我是时间管理大师)", s: 0 },
                    { t: "B. 不同意 (每次都是临时抱佛脚)", s: 0, reason: "needs_schedule" }
                ]
            },
            {
                q: "13. 我承认我有“拖延症”晚期，复习时手机比书本好看…… 📱",
                options: [
                    { t: "A. 同意 (被你看穿了)", s: 0, reason: "needs_discipline" },
                    { t: "B. 不同意 (我超专注)", s: 0 }
                ]
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let userName = "";
        let reasons = [];
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxT_3CptFtvzMp7IPnurB-GWjRybyVHOh8GifvhJcxVSlyt6MZ7R1jrnxN4TNuuT036Yw/exec";
 
        function startQuiz() {
            userName = document.getElementById('user-name').value.trim();
            if (!userName) {
                const input = document.getElementById('user-name');
                input.style.borderColor = "#ff4444";
                input.placeholder = "请先输入名字哦！🙏";
                return;
            }
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/13`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;

            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 font-bold flex justify-between items-center";
                btn.innerHTML = `<span>${opt.t}</span> <span class="opacity-0">➜</span>`;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });
        }

        function selectOption(opt) {
            score += opt.s;
            if (opt.reason) reasons.push(opt.reason);
            
            const container = document.getElementById('quiz-page');
            container.style.opacity = "0.5";
            
            setTimeout(() => {
                currentIdx++;
                if (currentIdx < questions.length) {
                    showQuestion();
                    container.style.opacity = "1";
                } else {
                    finishQuiz();
                }
            }, 250);
        }

        async function finishQuiz() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('score-circle-path').style.strokeDasharray = `${score}, 100`;

            let title = "";
            let desc = "";

            if (score >= 80) {
                title = "🏆 SEJ 学霸本霸！";
                desc = `<p class="mb-3">哇！<b>${userName}</b>，你真的很稳！这基础已经吊打很多人了。</p><p>但在 SPM，如何把 KBAT 拿满分才是关键！</p>`;
            } else if (score >= 50) {
                title = "💪 潜力股，再推一把就 A 了！";
                desc = `<p class="mb-3"><b>${userName}</b>，你有一定的基础，但有些考点开始模糊了，很容易在选择题丢分。</p>`;
            } else {
                title = "🆘 紧急救援状态！";
                desc = `<p class="mb-3"><b>${userName}</b>，你的 SEJ 情况有点危险哦！剩下的时间如果不抓重点，很难突围。</p>`;
            }

            // 幽默诊断
            if (reasons.length > 0) {
                desc += `<div class="mt-4 pt-4 border-t border-orange-500/20 text-orange-400 font-bold">建议：`;
                if (reasons.includes('needs_study_buddy')) desc += ` 你需要老师【陪太子复习】，帮你扫清迷茫！`;
                if (reasons.includes('needs_schedule')) desc += ` 课程固定时间，帮你告别临时抱佛脚！`;
                if (reasons.includes('needs_discipline')) desc += ` “上课模式”下，老师会全程监督你认真听课，拒绝拖延！`;
                desc += `</div>`;
            }

            document.getElementById('result-title').innerText = title;
            document.getElementById('result-desc').innerHTML = desc;

            // 保存到 Firestore 后台
            // 保存到 Google Sheet
try {
    await fetch(SHEET_API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
            "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
            name: userName,
            score: score,
            diagnosis: reasons
        })
    });

    console.log("已送去 Google Sheet");

} catch (e) {
    console.error("Google Sheet Save Error:", e);
}
        }
    </script>
</body>
</html>
