<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F4 SEJ 实力测试 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; }
        .cute-font { font-family: 'ZCOOL KuaiLe', cursive; }
        .gradient-btn { background: linear-gradient(45deg, #FF8C00, #FFA500); }
        .card { border-radius: 30px; background: rgba(20, 20, 20, 0.95); border: 2px solid #333; }
        .hidden { display: none; }
        .cute-input { background: #1a1a1a; border: 2px solid #444; border-radius: 15px; color: white; padding: 12px; }
        .option-btn { background: #222; border: 1px solid #444; border-radius: 15px; width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; transition: 0.2s; }
        .option-btn:hover { background: #FF8C00; color: #000; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 开始页面 -->
    <div id="start-page" class="max-w-md w-full text-center">
        <div class="card p-10 shadow-2xl">
            <h1 class="text-4xl font-black mb-4 cute-font text-orange-500">F4 SEJ 实力测试</h1>
            <p class="text-gray-400 mb-8 text-sm">完成测试后，成绩会自动记录在老师的表格里哦！</p>
            <input type="text" id="user-name" placeholder="请输入你的名字" class="cute-input w-full mb-6">
            <button onclick="startQuiz()" class="gradient-btn w-full py-4 rounded-full font-bold text-black text-xl">开始测试</button>
        </div>
    </div>

    <!-- 测验页面 -->
    <div id="quiz-page" class="max-w-md w-full hidden">
        <div class="card p-8">
            <div id="progress" class="text-xs text-orange-500 font-bold mb-4">Question 1/13</div>
            <h2 id="question-text" class="text-xl font-bold mb-6">载入中...</h2>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- 结果页面 -->
    <div id="result-page" class="max-w-md w-full hidden text-center">
        <div class="card p-8">
            <h2 class="text-3xl font-black text-orange-500 mb-4 cute-font">测试完成！</h2>
            <p class="text-lg mb-2">你的得分：<span id="final-score" class="text-4xl font-bold">0</span>/100</p>
            <div id="status-msg" class="text-sm text-gray-400 mb-8 italic">正在同步成绩到老师的表格...</div>
            <a href="你的课程链接" class="gradient-btn block w-full py-4 rounded-full font-bold text-black">了解《A战役》课程</a>
        </div>
    </div>

    <script>
        // 【重要】在这里填入你的 Google Web App URL
        const SHEET_URL = "在这里粘贴你的WEB_APP_URL";

        const questions = [
            { q: "1. F4 BAB 1: 哪项体现了马六甲王朝的 Kedaulatan？", options: [{ t: "Raja merupakan lambang kedaulatan", s: 10 }, { t: "Rakyat bebas membunuh", s: 0 }] },
            { q: "2. F4 BAB 2: Nasionalisme di Filipina 最初是由谁发起的？", options: [{ t: "Jose Rizal", s: 10 }, { t: "Emilio Aguinaldo", s: 0 }] },
            { q: "3. F4 BAB 3: 什么是“Ideologi Fasisme”？", options: [{ t: "Kepentingan negara lebih penting daripada individu", s: 10 }, { t: "Sistem demokrasi mutlak", s: 0 }] },
            { q: "4. F4 BAB 4: 为什么马来人反对 Malayan Union？", options: [{ t: "Kuasa Raja Melayu dihapuskan", s: 10 }, { t: "British memberi wang", s: 0 }] },
            { q: "5. F4 BAB 5: PTM 1948 成功恢复了什么？", options: [{ t: "Kedudukan Raja-raja Melayu", s: 10 }, { t: "Pentadbiran Jepun", s: 0 }] },
            { q: "6. F4 BAB 6: PKM 是如何威胁国家安全的？", options: [{ t: "Melakukan sabotaj ekonomi", s: 10 }, { t: "Menyokong British", s: 0 }] },
            { q: "7. F4 BAB 7: 谁是 Sistem Ahli 的成员？", options: [{ t: "Tokoh tempatan", s: 10 }, { t: "Pegawai dari Moscow", s: 0 }] },
            { q: "8. F4 BAB 8: 1955年大选哪个政党赢了 51/52 席位？", options: [{ t: "Parti Perikatan", s: 10 }, { t: "Parti Negara", s: 0 }] },
            { q: "9. F4 BAB 9: Reid Commission 的任务是？", options: [{ t: "Merangka Perlembagaan PTM", s: 10 }, { t: "Menyerang Komunis", s: 0 }] },
            { q: "10. F4 BAB 10: 独立当晚，国歌在何处首次响起？", options: [{ t: "Padang Kelab Selangor", s: 10 }, { t: "Stadium Melawati", s: 0 }] },
            { q: "11. 你觉得自己复习 SEJ 辛苦吗？", options: [{ t: "很辛苦", s: 0, r: "迷茫" }, { t: "还好", s: 0, r: "一般" }] },
            { q: "12. 你有拖延症吗？", options: [{ t: "有", s: 0, r: "拖延" }, { t: "没有", s: 0, r: "自律" }] },
            { q: "13. 如果有老师带你抓重点，你愿意吗？", options: [{ t: "愿意", s: 0, r: "求带" }, { t: "看情况", s: 0, r: "犹豫" }] }
        ];

        let currentIdx = 0, score = 0, userName = "", diagnosis = [];

        function startQuiz() {
            userName = document.getElementById('user-name').value.trim();
            if(!userName) { alert("请输入名字！"); return; }
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress').innerText = `Question ${currentIdx + 1}/13`;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn";
                btn.innerText = opt.t;
                btn.onclick = () => {
                    score += opt.s;
                    if(opt.r) diagnosis.push(opt.r);
                    currentIdx++;
                    if(currentIdx < questions.length) showQuestion();
                    else finishQuiz();
                };
                container.appendChild(btn);
            });
        }

        function finishQuiz() {
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            // 自动发送数据到 Google Sheets
            fetch(SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: userName, score: score, diagnosis: diagnosis })
            }).then(() => {
                document.getElementById('status-msg').innerText = "✅ 成绩已同步到老师的表格！";
            });
        }
    </script>
</body>
</html>
